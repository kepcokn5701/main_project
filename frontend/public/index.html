<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#070b16;color:#e2e8f0;min-height:100vh;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:#0f172a;}
::-webkit-scrollbar-thumb{background:#334155;border-radius:3px;}

@keyframes fadeInUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes modalIn{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes barGrow{from{width:0}to{width:var(--w)}}
@keyframes scanLine{0%{top:0;opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes dotBounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(56,189,248,.4)}70%{box-shadow:0 0 0 8px rgba(56,189,248,0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
@keyframes glowBorder{0%,100%{border-color:rgba(56,189,248,.2)}50%{border-color:rgba(56,189,248,.6);box-shadow:0 0 15px rgba(56,189,248,.15)}}

.project-card{border:1px solid rgba(148,163,184,.1);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);background:linear-gradient(145deg,#0f172a,#1a2540);}
.project-card:hover{transform:translateY(-5px);border-color:rgba(56,189,248,.5);box-shadow:0 20px 40px rgba(0,0,0,.5),0 0 25px rgba(56,189,248,.1);}
.project-card.placeholder{cursor:default;opacity:.7;}
.project-card.placeholder:hover{transform:none;border-color:rgba(148,163,184,.1);box-shadow:none;}

.tag-lang{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.35);color:#a5b4fc;}
.tag-lib{background:rgba(20,184,166,.15);border:1px solid rgba(20,184,166,.35);color:#5eead4;}
.tag-ai{background:rgba(139,92,246,.15);border:1px solid rgba(139,92,246,.35);color:#c4b5fd;}
.tag-front{background:rgba(251,146,60,.15);border:1px solid rgba(251,146,60,.35);color:#fdba74;}
.tag-back{background:rgba(52,211,153,.15);border:1px solid rgba(52,211,153,.35);color:#6ee7b7;}
.tag-rpa{background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.35);color:#fca5a5;}
.tag-db{background:rgba(234,179,8,.15);border:1px solid rgba(234,179,8,.35);color:#fde047;}

.modal-box{animation:modalIn .35s cubic-bezier(.34,1.56,.64,1);}
.sim-container{background:linear-gradient(135deg,#070b16,#0d1b2e);border:1px solid rgba(56,189,248,.15);border-radius:10px;overflow:hidden;animation:glowBorder 3s ease-in-out infinite;}
.chat-bubble-user{background:rgba(56,189,248,.15);border:1px solid rgba(56,189,248,.3);border-radius:12px 12px 2px 12px;}
.chat-bubble-ai{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:12px 12px 12px 2px;}
.dot1{width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;animation:dotBounce 1.4s infinite;animation-delay:0s;}
.dot2{width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;animation:dotBounce 1.4s infinite;animation-delay:.2s;}
.dot3{width:7px;height:7px;border-radius:50%;background:#94a3b8;display:inline-block;animation:dotBounce 1.4s infinite;animation-delay:.4s;}
.detection-box{position:absolute;animation:fadeIn .6s ease-out forwards;}
.spinner{width:16px;height:16px;border:2px solid #334155;border-top-color:#38bdf8;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}

.future-section{border:1px solid rgba(148,163,184,.08);border-radius:16px;overflow:hidden;margin-top:32px;}
.future-header{cursor:pointer;display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(15,23,42,.6);transition:background .2s;}
.future-header:hover{background:rgba(15,23,42,.9);}
.future-grid{display:none;padding:16px;}
.future-grid.open{display:grid;}
.future-card{border:1px solid rgba(148,163,184,.06);background:linear-gradient(145deg,rgba(15,23,42,.5),rgba(26,37,64,.3));border-radius:16px;padding:20px;opacity:.6;transition:opacity .2s;}
.future-card:hover{opacity:.8;}

.status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;border-radius:9999px;font-size:11px;font-weight:600;}
.status-active{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;}
.status-planned{background:rgba(251,191,36,.12);border:1px solid rgba(251,191,36,.25);color:#fde68a;}
.status-future{background:rgba(148,163,184,.1);border:1px solid rgba(148,163,184,.15);color:#94a3b8;}

</header>

<!-- ═══════════════════════════════════ SECTION TITLE ═══════════════════════════════════ -->
<div class="max-w-7xl mx-auto px-6 pt-8 pb-2">

<!-- ═══════════════════════════════════ MAIN CARDS ════════════════════════════════ -->
<main class="max-w-7xl mx-auto px-6 pb-8">

    <div class="future-header" onclick="toggleFuture()">
      <div class="flex items-center gap-3">
        <div class="w-1 h-6 rounded-full" style="background:linear-gradient(to bottom,#64748b,#334155);"></div>
        <h2 class="text-base font-bold text-slate-300">추후 개발 예정</h2>

      </div>
      <i data-lucide="chevron-down" id="future-chevron" style="width:20px;height:20px;color:#64748b;transition:transform .3s;"></i>
    </div>
    <div class="future-grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="future-grid"></div>
  </div>
</main>

<!-- ═══════════════════════════════════ MODAL ════════════════════════════════════ -->
<div id="modal-overlay" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4" style="background:rgba(0,0,0,.85);backdrop-filter:blur(6px);">

      <div id="modal-right" class="w-1/2 overflow-y-auto p-5" style="background:rgba(7,11,22,.5);"></div>
    </div>
  </div>
</div>

function openModal(id) {
  const p = PROJECTS.find(x => x.id === id);
  if (!p || p.status === 'planned') return;
  currentProjectId = id;
  if (!activeTab[id]) activeTab[id] = 0;
  clearSimTimers();

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  renderModalHeader(p);
  renderModalTabs(p);
  renderModalLeft(p, activeTab[id]);
  renderModalRight(p);
  setTimeout(() => startSim(p.sim, document.getElementById('sim-area')), 400);
  lucide.createIcons();
}

function closeModal() {
  clearSimTimers();
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  currentProjectId = null;
}

function renderModalHeader(p) {
  document.getElementById('modal-header').innerHTML = `
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0"
           style="background:linear-gradient(135deg,${p.gradFrom},${p.gradTo});">
        <i data-lucide="${p.icon}" style="width:18px;height:18px;color:white;"></i>
      </div>

      <button onclick="closeModal()" class="w-8 h-8 rounded-lg flex items-center justify-center hover:bg-slate-700 transition-colors">
        <i data-lucide="x" style="width:16px;height:16px;color:#94a3b8;"></i>
      </button>

}

const TAB_LABELS = ['🔧 기술 스택', '📋 워크플로우', '☁ 인프라', '🤖 AI 모델'];
function renderModalTabs(p) {
  document.getElementById('modal-tabs').innerHTML = TAB_LABELS.map((t,i)=>`
    <button onclick="switchTab(${p.id},${i})" class="text-xs px-4 py-2 rounded-lg transition-all font-medium

}

function switchTab(id, idx) {
  activeTab[id] = idx;
  const p = PROJECTS.find(x=>x.id===id);

  renderModalLeft(p, idx);

}

function restartSim() {
  if (!currentProjectId) return;
  clearSimTimers();
  const p = PROJECTS.find(x=>x.id===currentProjectId);
  const el = document.getElementById('sim-area');
  if (p && el) startSim(p.sim, el);
}

function clearSimTimers() {
  simTimers.forEach(t => { clearInterval(t); clearTimeout(t); });
  simTimers = [];
}

  if (!el) return;
  el.innerHTML = '';
  const fn = SIM[type];

  else el.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500 text-sm">시뮬레이션 준비 중...</div>';
}

  setTimeout(() => {
    el.querySelectorAll('.bar-anim').forEach(b => { b.style.width = b.dataset.w; });
    el.querySelectorAll('.counter').forEach(c => {
      let cur = 0, target = parseInt(c.dataset.target);
      const iv = setInterval(() => {
        cur = Math.min(cur + 2, target);
        c.textContent = cur + '%';
        if (cur >= target) clearInterval(iv);
      }, 30);
      simTimers.push(iv);
    });

    const kwArea = document.getElementById('kw-area');
    keywords.forEach((k, i) => {
      const t = setTimeout(() => {
        const span = document.createElement('span');
        span.className = 'text-xs px-2 py-1 rounded-full';
        span.style.cssText = `background:rgba(56,189,248,.1);border:1px solid rgba(56,189,248,.2);color:#7dd3fc;animation:fadeIn .4s ease-out;font-size:${11+Math.floor(Math.random()*4)}px`;
        span.textContent = k;
        kwArea.appendChild(span);
      }, i * 180);
      simTimers.push(t);
    });
  }, 300);
},
