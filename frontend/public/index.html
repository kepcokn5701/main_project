function openModal(id) {
  const p = findProject(id);
  if (!p || p.status === 'planned') return;
  currentProjectId = id;
  if (!activeTab[id]) activeTab[id] = 0;
  clearSimTimers();

  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('hidden');
  document.body.style.overflow = 'hidden';

  renderModalHeader(p);
  renderModalTabs(p);
  renderModalLeft(p, activeTab[id]);
  renderModalRight(p);
  setTimeout(() => startSim(p.sim, document.getElementById('sim-area')), 400);
  lucide.createIcons();
}

function closeModal() {
  clearSimTimers();
  document.getElementById('modal-overlay').classList.add('hidden');
  document.body.style.overflow = '';
  currentProjectId = null;
}

function renderModalHeader(p) {
  document.getElementById('modal-header').innerHTML = `

function renderModalTabs(p) {
  document.getElementById('modal-tabs').innerHTML = TAB_LABELS.map((t,i)=>`

function restartSim() {
  if (!currentProjectId) return;
  clearSimTimers();
  const p = findProject(currentProjectId);
  const el = document.getElementById('sim-area');
  if (p && el) startSim(p.sim, el);
}

function clearSimTimers() {
  simTimers.forEach(t => { clearInterval(t); clearTimeout(t); });
  simTimers = [];
}

  el.innerHTML = '';
  const fn = SIM[type];

  else el.innerHTML = '<div class="flex items-center justify-center h-full text-slate-500 text-sm">시뮬레이션 준비 중...</div>';
}

meter: (el) => {

        <polygon points="${pX(10)},${pY(predicted[10]*1.08)} ${pX(11)},${pY(predicted[11]*1.08)} ${pX(11)},${pY(predicted[11]*.92)} ${pX(10)},${pY(predicted[10]*.92)}" fill="rgba(249,115,22,.15)"/>
        ${actual.map((v,i)=>v!==null?`<circle cx="${pX(i)}" cy="${pY(v)}" r="3.5" fill="#38bdf8" stroke="#0f172a" stroke-width="1.5"/>`:'').join('')}
        ${predicted.map((v,i)=>v!==null?`<circle cx="${pX(i)}" cy="${pY(v)}" r="4" fill="#f97316" stroke="#0f172a" stroke-width="1.5"/>`:'').join('')}

        <rect x="${pX(10)-4}" y="${PAD}" width="${xStep+8}" height="${H-PAD*2}" fill="rgba(249,115,22,.05)" rx="3"/>
        <text x="${pX(10)+xStep/2}" y="${PAD+10}" text-anchor="middle" fill="#f97316" font-size="8">예측 구간</text>

// ──── Anomaly Detection ───────────────────────────────────
anomaly: (el) => {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const usage = [420,408,415,190,412,398,425,411,88,420,415,408];
  const normal = [400,395,410,405,415,390,420,408,412,418,412,405];
  const isAnomaly = (v,n) => Math.abs(v-n) > 80;
  const maxV = 500;
  const H = 160, W = 400, PAD = 28;
  const bW = (W-PAD*2)/12 - 4;

  el.innerHTML = `
    <div class="p-2">
      <div class="text-xs font-bold text-slate-200 mb-3">월별 사용량 이상탐지 (계기번호 M-20291)</div>
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px;">
        ${months.map((m,i)=>{
          const x = PAD + i*(bW+4);
          const anomaly = isAnomaly(usage[i], normal[i]);
          const color = anomaly ? '#ef4444' : '#38bdf8';
          const normH = (normal[i]/maxV)*(H-PAD*2);
          const usageH = (usage[i]/maxV)*(H-PAD*2);
          return `
            <rect x="${x}" y="${H-PAD-normH}" width="${bW}" height="${normH}" fill="rgba(56,189,248,.15)" rx="2"/>
            <rect x="${x}" y="${H-PAD-usageH}" width="${bW}" height="${usageH}" fill="${color}" opacity="${anomaly?1:.6}" rx="2"/>
            <text x="${x+bW/2}" y="${H-4}" text-anchor="middle" fill="#475569" font-size="8">${m}</text>
            ${anomaly?`<text x="${x+bW/2}" y="${H-PAD-usageH-4}" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">!</text>`:''}
          `;
        }).join('')}
        <line x1="${PAD}" y1="${H-PAD}" x2="${W-PAD}" y2="${H-PAD}" stroke="#334155" stroke-width="1"/>
      </svg>
      <div class="flex gap-2 text-xs mt-2 mb-3">
        <span class="flex items-center gap-1"><span style="width:10px;height:10px;background:#38bdf8;opacity:.6;border-radius:2px;display:inline-block;"></span> 정상</span>
        <span class="flex items-center gap-1"><span style="width:10px;height:10px;background:#ef4444;border-radius:2px;display:inline-block;"></span> 이상(과소계량)</span>
        <span class="flex items-center gap-1"><span style="width:10px;height:10px;background:rgba(56,189,248,.15);border-radius:2px;display:inline-block;"></span> 평균패턴</span>
      </div>
      <div class="space-y-2">

          <div class="text-xs font-bold text-red-400 mb-1">🚨 이상 탐지: 2건 자동 적출</div>
          <div class="text-xs text-slate-300">4월: 190kWh (평균 405kWh 대비 <span class="text-red-400 font-bold">53% 감소</span>) — 즉시 점검 권고</div>
          <div class="text-xs text-slate-300 mt-1">9월: 88kWh (평균 412kWh 대비 <span class="text-red-400 font-bold">79% 감소</span>) — 우선 점검 권고</div>

          <span class="text-slate-300"> 4월 -0.82 / 9월 -0.91 (임계값: -0.5)</span>

// ──── Wiring Check ───────────────────────────────────────
wiring: (el) => {
  const wires = [
    {color:'황색(Yellow)',phase:'A상',expected:'1번 단자',current:'1번 단자',ok:true},
    {color:'적색(Red)',phase:'B상',expected:'2번 단자',current:'2번 단자',ok:true},
    {color:'갈색(Brown)',phase:'C상',expected:'3번 단자',current:'4번 단자',ok:false},
    {color:'백색(White)',phase:'N상',expected:'N 단자',current:'N 단자',ok:true},
    {color:'흑색(Black)',phase:'A상(전류)',expected:'5번 단자',current:'5번 단자',ok:true},
    {color:'청색(Blue)',phase:'B상(전류)',expected:'6번 단자',current:'6번 단자',ok:true},
    {color:'녹색(Green)',phase:'접지',expected:'접지 단자',current:'접지 단자',ok:true},
  ];
  let checked = 0;

  function render() {
    el.innerHTML = `
      <div class="p-2">
        <div class="flex items-center gap-2 mb-3 text-xs">
          <span class="spinner"></span>
          <span class="text-slate-300">YOLOv8 배선 분석 중... (${checked}/${wires.length})</span>
        </div>
        <div class="rounded-xl overflow-hidden mb-3" style="border:1px solid rgba(148,163,184,.1);">
          <div class="grid grid-cols-4 gap-0 text-xs font-semibold text-slate-400 p-2" style="background:rgba(15,23,42,.8);">
            <div>배선</div><div>단자</div><div>탐지</div><div>상태</div>
          </div>
          ${wires.map((w,i)=>`
            <div class="grid grid-cols-4 gap-0 text-xs p-2 items-center" style="background:${i%2?'rgba(30,41,59,.3)':'rgba(15,23,42,.3)'};${i===checked-1&&!w.ok?'background:rgba(239,68,68,.08);border-left:3px solid #ef4444;':''}">
              <div class="flex items-center gap-1.5">
                <div style="width:10px;height:10px;border-radius:50%;border:2px solid;border-color:${getWireColor(w.color)};background:${getWireBg(w.color)};"></div>
                <span class="text-slate-300">${w.color.split('(')[0]}</span>
              </div>
              <div class="text-slate-300">${w.expected}</div>
              <div class="${i<checked?'':'text-slate-600'}">${i<checked?w.current:'—'}</div>
              <div>${i<checked?(w.ok?'<span class="text-green-400">✓ 정상</span>':'<span class="text-red-400 font-bold">✗ 오류</span>'):'<span class="text-slate-600">—</span>'}</div>
            </div>`).join('')}
        </div>
        ${checked >= wires.length ? `
          <div class="p-3 rounded-xl" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.35);">
            <div class="text-xs font-bold text-red-400 text-base mb-1">🚨 오결선 감지!</div>
            <div class="text-xs text-slate-200">갈색 배선 → 4번 단자 (3번이어야 함)</div>
            <div class="text-xs text-red-300 mt-1 font-medium">📢 음성 안내: "갈색 배선 오결선 확인. 3번 단자로 재연결하십시오."</div>
          </div>` : ''}
      </div>`;
  }

  render();
  const iv = setInterval(() => {
    if (checked < wires.length) { checked++; render(); }
    else clearInterval(iv);
  }, 900);
  simTimers.push(iv);
},

// ──── Drone Detection ────────────────────────────────────
drone: (el) => {
  const detections = [
    {x:15,y:12,w:22,h:18,label:'애자 크랙',conf:94,color:'#ef4444',status:'불량',delay:600},
    {x:55,y:35,w:18,h:16,label:'금구류',conf:98,color:'#22c55e',status:'정상',delay:1200},
    {x:70,y:10,w:20,h:14,label:'수목 이격',conf:87,color:'#f59e0b',status:'주의',delay:1800},
    {x:30,y:55,w:16,h:14,label:'애자',conf:96,color:'#22c55e',status:'정상',delay:2400},
  ];

  el.innerHTML = `
    <div class="p-2">
      <div class="text-xs font-bold text-slate-200 mb-2">📡 드론 영상 AI 분석 — 철탑 #T-402</div>
      <div class="relative rounded-xl overflow-hidden mb-3" style="background:linear-gradient(135deg,#0a1628,#0d2240);border:1px solid rgba(56,189,248,.2);height:220px;">
        <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);opacity:.15;">
          <svg width="120" height="180" viewBox="0 0 120 180">
            <line x1="60" y1="10" x2="60" y2="170" stroke="#94a3b8" stroke-width="3"/>
            <line x1="10" y1="60" x2="110" y2="60" stroke="#94a3b8" stroke-width="2"/>
            <line x1="20" y1="100" x2="100" y2="100" stroke="#94a3b8" stroke-width="2"/>
            <line x1="30" y1="140" x2="90" y2="140" stroke="#94a3b8" stroke-width="2"/>
            <line x1="60" y1="10" x2="10" y2="60" stroke="#94a3b8" stroke-width="1"/>
            <line x1="60" y1="10" x2="110" y2="60" stroke="#94a3b8" stroke-width="1"/>
          </svg>
        </div>
        ${[0,1,2,3,4].map(i=>`<div style="position:absolute;left:0;right:0;top:${i*20}%;height:1px;background:rgba(56,189,248,.06);"></div>`).join('')}
        ${[0,1,2,3,4].map(i=>`<div style="position:absolute;top:0;bottom:0;left:${i*20}%;width:1px;background:rgba(56,189,248,.06);"></div>`).join('')}
        <div id="det-boxes"></div>
        <div style="position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#38bdf8,transparent);animation:scanLine 3s linear infinite;top:0;"></div>
        <div class="absolute top-2 left-2 text-xs text-sky-400 font-mono" style="background:rgba(0,0,0,.5);padding:2px 6px;border-radius:4px;">REC ● LIVE</div>
        <div class="absolute top-2 right-2 text-xs text-slate-300 font-mono" style="background:rgba(0,0,0,.5);padding:2px 6px;border-radius:4px;">YOLOv8n · 30fps</div>
      </div>
      <div id="det-table" class="space-y-1"></div>
    </div>`;

  const boxArea = document.getElementById('det-boxes');
  const table = document.getElementById('det-table');

  detections.forEach((d, i) => {
    const t = setTimeout(() => {
      const box = document.createElement('div');
      box.className = 'detection-box';
      box.style.cssText = `left:${d.x}%;top:${d.y}%;width:${d.w}%;height:${d.h}%;border:1.5px solid ${d.color};border-radius:4px;`;
      box.innerHTML = `<span style="position:absolute;top:-18px;left:0;font-size:9px;color:${d.color};background:rgba(0,0,0,.7);padding:1px 4px;border-radius:3px;white-space:nowrap;">${d.label} ${d.conf}%</span>`;
      boxArea.appendChild(box);

      const row = document.createElement('div');
      row.style.cssText = `display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:8px;background:rgba(15,23,42,.7);border:1px solid rgba(148,163,184,.08);animation:fadeInUp .4s ease-out;font-size:11px;`;
      row.innerHTML = `<span style="color:#e2e8f0;">${d.label}</span><span style="color:#94a3b8;">신뢰도 ${d.conf}%</span><span style="color:${d.color};font-weight:600;">${d.status}</span>`;
      table.appendChild(row);

    simTimers.push(t);
  });

  const t = setTimeout(() => {
    const summary = document.createElement('div');
    summary.style.cssText = `margin-top:8px;padding:10px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);animation:fadeIn .5s ease-out;font-size:11px;`;
    summary.innerHTML = `<div style="color:#f87171;font-weight:700;margin-bottom:4px;">📋 자동 리포트 생성됨</div><div style="color:#94a3b8;">정상 2건 · 주의 1건 · 불량 1건 → 철탑점검 업무지시 자동 발행</div>`;
    table.appendChild(summary);
  }, 3200);
  simTimers.push(t);
},

// ──── Relay Verification ─────────────────────────────────
relay: (el) => {
  const relays = [
    {id:'GCB-101A', type:'거리계전기', setting:'1.2Ω / 0.3s', expected:'1.0~1.5Ω', status:'normal'},
    {id:'OCR-201B', type:'과전류계전기', setting:'2.5A / 0.5s', expected:'2.0~3.0A', status:'normal'},
    {id:'DFR-301C', type:'차동계전기', setting:'0.18pu / 즉시', expected:'0.15~0.25pu', status:'warning'},
    {id:'GCB-402D', type:'거리계전기', setting:'0.8Ω / 0.2s', expected:'1.0~1.5Ω', status:'error'},
    {id:'OCR-503E', type:'과전류계전기', setting:'1.8A / 0.6s', expected:'1.5~2.5A', status:'normal'},
  ];
  let checked = 0;

  const statusConf = {
    normal:{color:'#22c55e',bg:'rgba(34,197,94,.08)',border:'rgba(34,197,94,.2)',icon:'✓',label:'정상'},
    warning:{color:'#f59e0b',bg:'rgba(245,158,11,.08)',border:'rgba(245,158,11,.2)',icon:'⚠',label:'경고'},
    error:{color:'#ef4444',bg:'rgba(239,68,68,.08)',border:'rgba(239,68,68,.2)',icon:'✗',label:'오류'},
  };

  function render() {
    const counts = {normal:0,warning:0,error:0};
    relays.slice(0,checked).forEach(r=>counts[r.status]++);
    el.innerHTML = `
      <div class="p-2">
        <div class="flex items-center gap-2 mb-3 text-xs">
          ${checked<relays.length?`<span class="spinner"></span><span class="text-slate-300">정정값 검증 중 (${checked}/${relays.length})</span>`:`<span class="text-green-400 font-bold">✓ 검증 완료</span>`}
        </div>
        <div class="rounded-xl overflow-hidden mb-3" style="border:1px solid rgba(148,163,184,.1);">
          <div class="grid text-xs font-semibold text-slate-400 p-2" style="grid-template-columns:1fr 1fr 1fr 1fr 80px;background:rgba(15,23,42,.9);">
            <div>계전기 ID</div><div>정정값</div><div>허용범위</div><div>유형</div><div>검증</div>
          </div>
          ${relays.map((r,i)=>{
            const sc = statusConf[r.status];
            const show = i < checked;
            return `<div class="grid text-xs p-2 items-center" style="grid-template-columns:1fr 1fr 1fr 1fr 80px;background:${show&&r.status!=='normal'?sc.bg:i%2?'rgba(30,41,59,.2)':'rgba(15,23,42,.2)'};${show&&r.status!=='normal'?`border-left:3px solid ${sc.color};`:''}">
              <div class="font-mono text-slate-200">${r.id}</div>
              <div class="font-mono text-sky-300">${show?r.setting:'—'}</div>
              <div class="text-slate-400">${show?r.expected:'—'}</div>
              <div class="text-slate-400">${r.type}</div>
              <div>${show?`<span style="color:${sc.color};font-weight:700;">${sc.icon} ${sc.label}</span>`:'<span class="text-slate-600">대기</span>'}</div>
            </div>`;
          }).join('')}
        </div>
        ${checked >= relays.length ? `
          <div class="grid grid-cols-3 gap-2 mb-2">
            <div class="p-2 rounded-lg text-center" style="background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);">
              <div class="text-base font-bold text-green-400">${counts.normal}</div>
              <div class="text-xs text-slate-400">정상</div>
            </div>
            <div class="p-2 rounded-lg text-center" style="background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);">
              <div class="text-base font-bold text-yellow-400">${counts.warning}</div>
              <div class="text-xs text-slate-400">경고</div>
            </div>
            <div class="p-2 rounded-lg text-center" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);">
              <div class="text-base font-bold text-red-400">${counts.error}</div>
              <div class="text-xs text-slate-400">오류</div>
            </div>
          </div>
          <div class="p-2 rounded-xl text-xs" style="background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);">
            <div class="text-red-400 font-bold">🚨 GCB-402D: 정정값 범위 이탈</div>
            <div class="text-slate-300 mt-1">현재값 0.8Ω — 허용범위(1.0~1.5Ω) 미만. 담당자 즉시 검토 요망.</div>
          </div>` : ''}
      </div>`;
  }

  render();
  const iv = setInterval(() => {
    if (checked < relays.length) { checked++; render(); }
    else clearInterval(iv);
  }, 1200);
  simTimers.push(iv);
},

}; // end SIM

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// HELPERS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function getWireColor(c) {
  const m = {'황색':'#eab308','적색':'#ef4444','갈색':'#92400e','백색':'#e2e8f0','흑색':'#475569','청색':'#3b82f6','녹색':'#22c55e'};
  for (const k in m) if (c.startsWith(k)) return m[k];
  return '#94a3b8';
}
function getWireBg(c) {
  const m = {'황색':'rgba(234,179,8,.3)','적색':'rgba(239,68,68,.3)','갈색':'rgba(146,64,14,.3)','백색':'rgba(226,232,240,.3)','흑색':'rgba(71,85,105,.3)','청색':'rgba(59,130,246,.3)','녹색':'rgba(34,197,94,.3)'};
  for (const k in m) if (c.startsWith(k)) return m[k];
  return 'transparent';
}

// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
renderCards();
renderFuture();
lucide.createIcons();
</script>
